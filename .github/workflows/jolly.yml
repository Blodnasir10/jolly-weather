name: Jolly - Klukkustundarlærdómur

on:
  schedule:
    # Keyrir 5 mínútum eftir hvern heilan tíma - 24x á dag
    - cron: '5 * * * *'
  # Keyrir líka þegar breytingar eru gerðar
  push:
    branches: [main]
  # Leyfir handvirka keyrslu
  workflow_dispatch:

jobs:
  update-jolly:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Sækja kóða
        uses: actions/checkout@v4

      - name: 🐍 Setja upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Setja upp pakka
        run: pip install requests

      - name: 🌦️ Keyra Jolly
        run: python jolly.py

      - name: 💾 Vista gögn í GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🌦️ Jolly ${{ github.run_id }}"
          file_pattern: "docs/data/*.json"
          commit_user_name: "Jolly Bot"
          commit_user_email: "jolly@weather.bot"
