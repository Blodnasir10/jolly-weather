<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jolly 🌦️ — Veðurspá Egilsstaðir</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#07111f;--surface:#0d1b2e;--card:#132238;--border:#1a3050;
    --jolly:#4ade80;--icon:#fb923c;--gfs:#a78bfa;--ecmwf:#f472b6;
    --text:#e2e8f0;--muted:#64748b;--accent:#7dd3fc;
  }
  html{scroll-behavior:smooth}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* ── HEADER ── */
  header{
    background:linear-gradient(135deg,#071828 0%,#0d2440 50%,#071828 100%);
    border-bottom:1px solid var(--border);
    padding:20px 16px 16px;
    text-align:center;
    position:sticky;top:0;z-index:100;
  }
  .logo{font-size:2rem;margin-bottom:2px}
  header h1{font-size:1.6rem;color:var(--jolly);letter-spacing:.02em}
  header p{font-size:.78rem;color:var(--muted);margin-top:3px}
  .status-bar{
    display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
    margin-top:10px;font-size:.72rem;
  }
  .status-pill{
    padding:3px 10px;border-radius:20px;border:1px solid var(--border);
    background:var(--surface);
  }
  .status-pill.ok{border-color:#4ade8066;color:#4ade80}
  .status-pill.warn{border-color:#fbbf2466;color:#fbbf24}
  .status-pill.err{border-color:#f8717166;color:#f87171}

  /* ── MAIN ── */
  main{max-width:900px;margin:0 auto;padding:16px}

  /* ── NOW CARD ── */
  .now-card{
    background:linear-gradient(135deg,var(--card),#0a1f35);
    border:1px solid var(--border);border-radius:16px;
    padding:20px;margin-bottom:16px;
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;
    position:relative;overflow:hidden;
  }
  .now-card::before{
    content:'';position:absolute;top:-40px;right:-40px;
    width:180px;height:180px;
    background:radial-gradient(circle,rgba(74,222,128,.08),transparent 70%);
    pointer-events:none;
  }
  .now-item{text-align:center}
  .now-label{font-size:.68rem;color:var(--muted);margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase}
  .now-value{font-size:2rem;font-weight:800;color:var(--jolly);line-height:1}
  .now-unit{font-size:.8rem;color:var(--muted);margin-top:2px}
  .now-sub{font-size:.68rem;color:var(--muted);margin-top:4px}

  /* ── SECTION ── */
  .section-title{
    font-size:.72rem;color:var(--accent);font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;
    margin:18px 0 10px;display:flex;align-items:center;gap:8px;
  }
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}

  /* ── METRIC TABS ── */
  .metric-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .mtab{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;
    font-size:.8rem;font-weight:600;background:var(--card);color:var(--muted);
    transition:all .18s;border:1px solid var(--border)}
  .mtab.active{background:#0d2e12;color:var(--jolly);border-color:var(--jolly)}

  /* ── CHART ── */
  .chart-card{background:var(--card);border-radius:12px;padding:16px;
    border:1px solid var(--border);margin-bottom:12px}
  canvas{max-height:240px}
  .legend{display:flex;gap:14px;font-size:.74rem;flex-wrap:wrap;margin-bottom:10px}
  .legend-item{display:flex;align-items:center;gap:6px}
  .legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .legend-line{width:18px;height:3px;border-radius:2px;flex-shrink:0}

  /* ── FORECAST TABLE ── */
  .fc-table-wrap{background:var(--card);border-radius:12px;overflow:auto;
    border:1px solid var(--border);margin-bottom:12px}
  .fc-table{width:100%;border-collapse:collapse;font-size:.75rem;min-width:500px}
  .fc-table th{background:#0a1628;color:var(--muted);padding:8px 10px;
    text-align:center;font-weight:600;font-size:.68rem;letter-spacing:.04em;white-space:nowrap}
  .fc-table td{padding:6px 10px;text-align:center;border-top:1px solid var(--border);white-space:nowrap}
  .fc-table tr:hover td{background:#0f1e35}
  .fc-table .day-sep td{background:#0a1628;color:var(--accent);font-weight:700;
    font-size:.7rem;text-align:left;padding:5px 10px}
  .jolly-val{color:var(--jolly);font-weight:700}
  .night{color:#475569}

  /* ── MODEL CARDS ── */
  .model-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .model-card{background:var(--card);border-radius:10px;padding:12px;
    border:1px solid var(--border);text-align:center}
  .model-name{font-size:.72rem;font-weight:700;margin-bottom:6px}
  .model-bias{font-size:.78rem;margin-bottom:3px}
  .model-mae{font-size:.68rem;color:var(--muted)}
  .model-weight{font-size:.68rem;margin-top:6px}
  .weight-bar{height:5px;background:var(--border);border-radius:3px;margin-top:3px}
  .weight-fill{height:100%;border-radius:3px;transition:width .5s ease}

  /* ── LEARNING CHART ── */
  .learn-card{background:var(--card);border-radius:12px;padding:16px;
    border:1px solid var(--border);margin-bottom:12px}

  /* ── LAST UPDATED ── */
  .footer{text-align:center;padding:20px;font-size:.7rem;color:var(--muted);
    border-top:1px solid var(--border);margin-top:8px}

  /* ── LOADING ── */
  .loading{text-align:center;padding:40px;color:var(--muted)}
  .spinner{display:inline-block;width:24px;height:24px;
    border:3px solid var(--border);border-top-color:var(--jolly);
    border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .error-card{background:#1a0a0a;border:1px solid #f8717144;border-radius:12px;
    padding:20px;text-align:center;color:#f87171;margin:20px 0}

  @media(max-width:560px){
    .now-card{grid-template-columns:1fr 1fr}
    .model-grid{grid-template-columns:1fr 1fr}
    .now-value{font-size:1.5rem}
  }
</style>
</head>
<body>

<header>
  <div class="logo">🌦️</div>
  <h1>Jolly</h1>
  <p>Staðbundið veðurspálíkan — Egilsstaðir (stöð 571)</p>
  <div class="status-bar">
    <span class="status-pill" id="pillUpdated">⏳ Hleð...</span>
    <span class="status-pill" id="pillTraining">🧠 —</span>
    <span class="status-pill" id="pillModels">📡 ICON · GFS · ECMWF</span>
  </div>
</header>

<main>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>Hleð Jolly spá...</div>
    </div>
  </div>
</main>

<div class="footer" id="footer"></div>

<script>
const JOLLY_COLOR = '#4ade80';
const MODEL_COLORS = { icon:'#fb923c', gfs:'#a78bfa', ecmwf:'#f472b6' };
const MODEL_NAMES  = { icon:'ICON',    gfs:'GFS27',   ecmwf:'ECMWF' };

let FC = null, MODEL = null;
let activeMetric = 'hiti';
let charts = {};

// ─── LOAD DATA ───────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [fcRes, modelRes] = await Promise.all([
      fetch(`data/jolly_forecast.json?t=${Date.now()}`),
      fetch(`data/jolly_model.json?t=${Date.now()}`),
    ]);
    FC    = await fcRes.json();
    MODEL = await modelRes.json();
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="error-card">
        <div style="font-size:2rem;margin-bottom:8px">😕</div>
        <div style="font-weight:700;margin-bottom:6px">Gögn ekki tiltæk</div>
        <div style="font-size:.78rem;opacity:.7">Jolly hefur ekki keyrt enn. Athugaðu GitHub Actions.</div>
        <div style="font-size:.68rem;margin-top:8px;opacity:.5">${e.message}</div>
      </div>`;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  updateStatusBar();
  renderNowCard();
  document.getElementById('app').innerHTML = buildHTML();
  attachEvents();
  renderChart();
  renderLearnChart();
}

function updateStatusBar() {
  const updated = new Date(FC.generated);
  const age = Math.round((Date.now() - updated) / 60000);
  const ageStr = age < 60 ? `${age} mín` : `${Math.round(age/60)} klst`;

  const p1 = document.getElementById('pillUpdated');
  p1.textContent = `🕐 Uppfært fyrir ${ageStr}`;
  p1.className = `status-pill ${age < 420 ? 'ok' : 'warn'}`;

  const p2 = document.getElementById('pillTraining');
  p2.textContent = `🧠 ${MODEL.training_days} þjálfunardagar`;
  p2.className = `status-pill ${MODEL.training_days > 7 ? 'ok' : 'warn'}`;
}

function renderNowCard() {
  const times = FC.hourly.time;
  const now = new Date().toISOString().slice(0,13);
  const idx = times.findIndex(t => t.slice(0,13) >= now) || 0;

  const temp = FC.hourly.temperature[idx];
  const wind = FC.hourly.windspeed[idx];
  const prec = FC.hourly.precipitation[idx];

  // Insert now card before app div
  const nowDiv = document.createElement('div');
  nowDiv.className = 'now-card';
  nowDiv.innerHTML = `
    <div class="now-item">
      <div class="now-label">Hiti núna</div>
      <div class="now-value">${temp !== null ? temp.toFixed(1) : '—'}</div>
      <div class="now-unit">°C</div>
      <div class="now-sub">Jolly leiðrétt</div>
    </div>
    <div class="now-item">
      <div class="now-label">Vindur</div>
      <div class="now-value">${wind !== null ? wind.toFixed(1) : '—'}</div>
      <div class="now-unit">m/s</div>
      <div class="now-sub">Leiðrétt</div>
    </div>
    <div class="now-item">
      <div class="now-label">Úrkoma</div>
      <div class="now-value">${prec !== null ? prec.toFixed(1) : '—'}</div>
      <div class="now-unit">mm/klst</div>
      <div class="now-sub">Leiðrétt</div>
    </div>
  `;
  document.querySelector('main').insertBefore(nowDiv, document.getElementById('app'));
}

function buildHTML() {
  return `
    <div class="section-title">📈 72 klst. spá</div>
    <div class="metric-tabs">
      <button class="mtab active" onclick="setMetric('hiti',this)">🌡️ Hiti</button>
      <button class="mtab" onclick="setMetric('vindur',this)">💨 Vindur</button>
      <button class="mtab" onclick="setMetric('urkoma',this)">🌧️ Úrkoma</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-line" style="background:${JOLLY_COLOR};height:3px"></div> Jolly (leiðrétt)</div>
      ${Object.keys(MODEL_COLORS).map(m=>`<div class="legend-item"><div class="legend-dot" style="background:${MODEL_COLORS[m]}"></div>${MODEL_NAMES[m]}</div>`).join('')}
    </div>
    <div class="chart-card"><canvas id="mainChart"></canvas></div>

    <div class="section-title">📋 Tímaspá</div>
    <div class="fc-table-wrap">${buildForecastTable()}</div>

    <div class="section-title">🧠 Líkanaþyngd og leiðréttingar</div>
    <div class="model-grid">${buildModelCards()}</div>

    <div class="section-title">📊 Nákvæmniferill</div>
    <div class="learn-card"><canvas id="learnChart"></canvas></div>
  `;
}

function buildForecastTable() {
  const times = FC.hourly.time;
  let html = `<table class="fc-table">
    <tr>
      <th>Tími</th>
      <th style="color:${JOLLY_COLOR}">🌡 Jolly</th>
      <th style="color:${MODEL_COLORS.icon}">ICON</th>
      <th style="color:${MODEL_COLORS.gfs}">GFS</th>
      <th style="color:${MODEL_COLORS.ecmwf}">ECMWF</th>
      <th style="color:${JOLLY_COLOR}">💨 Jolly</th>
      <th style="color:${JOLLY_COLOR}">🌧 Jolly</th>
    </tr>`;

  let lastDate = '';
  times.forEach((t, i) => {
    const dt = new Date(t + 'Z');
    const dateStr = dt.toLocaleDateString('is-IS', {weekday:'short', day:'numeric', month:'numeric'});
    const timeStr = dt.toLocaleTimeString('is-IS', {hour:'2-digit', minute:'2-digit', timeZone:'Atlantic/Reykjavik'});
    const isNight = dt.getUTCHours() >= 22 || dt.getUTCHours() <= 5;

    if(dateStr !== lastDate) {
      html += `<tr class="day-sep"><td colspan="7">📅 ${dateStr}</td></tr>`;
      lastDate = dateStr;
    }

    const jollyT = FC.hourly.temperature[i];
    const jollyW = FC.hourly.windspeed[i];
    const jollyP = FC.hourly.precipitation[i];
    const iconT  = FC.hourly.model_temperatures?.icon?.[i];
    const gfsT   = FC.hourly.model_temperatures?.gfs?.[i];
    const ecT    = FC.hourly.model_temperatures?.ecmwf?.[i];

    const cls = isNight ? ' class="night"' : '';
    html += `<tr${cls}>
      <td>${timeStr}</td>
      <td class="jolly-val">${jollyT !== null ? jollyT.toFixed(1)+'°' : '—'}</td>
      <td>${iconT !== null && iconT !== undefined ? iconT.toFixed(1)+'°' : '—'}</td>
      <td>${gfsT  !== null && gfsT  !== undefined ? gfsT.toFixed(1)+'°'  : '—'}</td>
      <td>${ecT   !== null && ecT   !== undefined ? ecT.toFixed(1)+'°'   : '—'}</td>
      <td class="jolly-val">${jollyW !== null ? jollyW.toFixed(1)+' m/s' : '—'}</td>
      <td class="jolly-val">${jollyP !== null && jollyP > 0 ? jollyP.toFixed(2)+' mm' : '—'}</td>
    </tr>`;
  });
  return html + '</table>';
}

function buildModelCards() {
  return Object.keys(MODEL_COLORS).map(m => {
    const b = MODEL.biases?.[m] || {};
    const w = MODEL.weights?.[m] || 0.333;
    const lastMAE = MODEL.mae_history?.slice(-1)[0]?.mae?.[m];

    return `<div class="model-card">
      <div class="model-name" style="color:${MODEL_COLORS[m]}">${MODEL_NAMES[m]}</div>
      <div class="model-bias">Hita bias: <strong>${b.hiti !== undefined ? (b.hiti >= 0 ? '+' : '') + b.hiti.toFixed(2) + '°C' : '—'}</strong></div>
      <div class="model-bias">Vind bias: <strong>${b.vindur !== undefined ? (b.vindur >= 0 ? '+' : '') + b.vindur.toFixed(2) + ' m/s' : '—'}</strong></div>
      <div class="model-mae">MAE: ${lastMAE ? lastMAE.hiti.toFixed(2) + '°C' : '—'}</div>
      <div class="model-weight">Þyngd: ${(w * 100).toFixed(0)}%</div>
      <div class="weight-bar"><div class="weight-fill" style="width:${(w*100).toFixed(0)}%;background:${MODEL_COLORS[m]}"></div></div>
    </div>`;
  }).join('');
}

// ─── CHART ───────────────────────────────────────────────────────────────────
function setMetric(m, el) {
  activeMetric = m;
  document.querySelectorAll('.mtab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderChart();
}

function renderChart() {
  if(charts.main) charts.main.destroy();
  const ctx = document.getElementById('mainChart')?.getContext('2d');
  if(!ctx) return;

  const times = FC.hourly.time.map(t => {
    const d = new Date(t + 'Z');
    return d.toLocaleString('is-IS', {
      weekday:'short', hour:'2-digit', minute:'2-digit',
      timeZone:'Atlantic/Reykjavik'
    });
  });

  const isBar = activeMetric === 'urkoma';
  let jollyData, datasets;

  if(activeMetric === 'hiti') {
    jollyData = FC.hourly.temperature;
    datasets = [
      ...Object.keys(MODEL_COLORS).map(m => ({
        label: MODEL_NAMES[m],
        data: FC.hourly.model_temperatures?.[m] || [],
        borderColor: MODEL_COLORS[m],
        backgroundColor: 'transparent',
        borderWidth: 1.5, pointRadius: 0, tension: .3, spanGaps: true,
        borderDash: [4,3],
      })),
      { label:'Jolly', data:jollyData, borderColor:JOLLY_COLOR,
        backgroundColor:'rgba(74,222,128,.1)', borderWidth:3,
        pointRadius:0, tension:.3, fill:true },
    ];
  } else if(activeMetric === 'vindur') {
    jollyData = FC.hourly.windspeed;
    datasets = [
      ...Object.keys(MODEL_COLORS).map(m => ({
        label: MODEL_NAMES[m],
        data: FC.hourly.model_windspeeds?.[m] || [],
        borderColor: MODEL_COLORS[m],
        backgroundColor: 'transparent',
        borderWidth: 1.5, pointRadius: 0, tension: .3, spanGaps: true,
        borderDash: [4,3],
      })),
      { label:'Jolly', data:jollyData, borderColor:JOLLY_COLOR,
        backgroundColor:'rgba(74,222,128,.1)', borderWidth:3,
        pointRadius:0, tension:.3, fill:true },
    ];
  } else {
    jollyData = FC.hourly.precipitation;
    datasets = [{
      label:'Jolly', data:jollyData,
      backgroundColor:'rgba(74,222,128,.7)', borderColor:JOLLY_COLOR,
      borderWidth:1,
    }];
  }

  charts.main = new Chart(ctx, {
    type: isBar ? 'bar' : 'line',
    data: { labels: times, datasets },
    options: {
      responsive:true,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{ callbacks:{
          label: c => `${c.dataset.label}: ${c.parsed.y !== null ? c.parsed.y + (activeMetric==='hiti'?'°C':activeMetric==='vindur'?' m/s':' mm') : '—'}`
        }}
      },
      scales:{
        x:{ ticks:{color:'#64748b',font:{size:9},maxTicksLimit:12,maxRotation:45}, grid:{color:'#0d1b2e'} },
        y:{ ticks:{color:'#64748b'}, grid:{color:'#1a3050'},
          title:{display:true, text: activeMetric==='hiti'?'°C':activeMetric==='vindur'?'m/s':'mm', color:'#475569'} }
      }
    }
  });
}

function renderLearnChart() {
  if(charts.learn) charts.learn.destroy();
  const ctx = document.getElementById('learnChart')?.getContext('2d');
  if(!ctx || !MODEL.mae_history?.length) return;

  const hist = MODEL.mae_history.slice(-30);
  const labels = hist.map(h => h.date);

  const datasets = Object.keys(MODEL_COLORS).map(m => ({
    label: MODEL_NAMES[m],
    data: hist.map(h => h.mae?.[m]?.hiti ?? null),
    borderColor: MODEL_COLORS[m],
    backgroundColor: 'transparent',
    borderWidth: 2, pointRadius: 3, tension: .3, spanGaps: true,
  }));

  charts.learn = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets },
    options:{
      responsive:true,
      plugins:{
        legend:{ labels:{color:'#94a3b8', font:{size:10}} },
        title:{display:true, text:'MAE hita eftir leiðréttingu (°C) — síðustu 30 dagar',
               color:'#94a3b8', font:{size:11}}
      },
      scales:{
        x:{ticks:{color:'#64748b',font:{size:9}}},
        y:{ticks:{color:'#64748b'}, grid:{color:'#1a3050'},
           title:{display:true, text:'MAE (°C)', color:'#475569'}}
      }
    }
  });
}

function attachEvents() {
  // re-attach if needed
}

// ─── FOOTER ──────────────────────────────────────────────────────────────────
function renderFooter() {
  document.getElementById('footer').innerHTML = `
    Jolly v1 · Open-Meteo API · Veðurstofa Íslands stöð 571 · Egilsstaðir ·
    Uppfærist á 6 klst. fresti með GitHub Actions
  `;
}

// ─── START ───────────────────────────────────────────────────────────────────
loadData();
renderFooter();
</script>
</body>
</html>
